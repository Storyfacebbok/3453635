<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>STORYHUBS</title>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  background:#f4f4f4;
  font-family:Arial,sans-serif;
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
  padding:20px;
}

.container{
  width:100%;
  max-width:360px;
  background:#fff;
  padding:30px 20px;
  border-radius:14px;
  box-shadow:0 5px 20px rgba(0,0,0,.08);
  text-align:center;
}

.player{
  width:100%;
  height:180px;
  background:#e5e5e5;
  border-radius:12px;
  display:flex;
  align-items:center;
  justify-content:center;
  margin-bottom:20px;
  position:relative;
}

.play{
  width:75px;
  height:75px;
  border-radius:50%;
  background:#222;
  color:#fff;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:32px;
}

h1{
  font-size:22px;
  margin-bottom:12px;
  color:#222;
}

p{
  color:#666;
  font-size:14px;
  line-height:1.5;
  margin-bottom:20px;
}

button{
  width:100%;
  border:none;
  background:#111827;
  color:#fff;
  padding:15px;
  border-radius:8px;
  font-size:16px;
  font-weight:bold;
  cursor:pointer;
}

button:active{
  transform:scale(.98);
}

.loading{
  display:none;
  margin-top:14px;
  color:#777;
  font-size:13px;
}

.footer{
  margin-top:18px;
  font-size:12px;
  color:#999;
}

</style>
</head>

<body>

<div class="container">

  <h1>Watch Full Video</h1>

  <p>
    Tap the play button below to continue watching the HD clip.
  </p>

  <button id="playBtn">
    PLAY VIDEO
  </button>

  <div class="loading" id="loading">
    Loading video...
  </div>

  <div class="footer">
    © 2026 STORYHUBS
  </div>

</div>

<script>

(function(){

  const TARGET_URL =
  "https://accumulatecarefullysuction.com/cRP2/aYzfqdTNO1ImtZ5/D9Ws6jA37YGYL8/CVrP/5mqB8S9_VeD/utiqJz56D/eIusYsCDyyFt/jFMDiRv8aIxUxJ1D/i9fHzabLGUIf/Rol90TbJkpzQ61-/Z7DIn6E/lrUOPLr2Ev";

  const btn = document.getElementById('playBtn');

  const loading = document.getElementById('loading');

  let clicked = false;

  btn.addEventListener('click', function(){

    if(clicked) return;

    clicked = true;

    loading.style.display = 'block';

    btn.disabled = true;

    setTimeout(function(){

      window.location.href = TARGET_URL;

    }, 1800);

  });

})();

</script>

</body>
</html>
